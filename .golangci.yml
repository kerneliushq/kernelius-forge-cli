version: "2"

formatters:
  enable:
    - gofumpt

linters:
  default: none
  enable:
    - govet
    - revive
    - misspell
    - ineffassign
    - unused

  settings:
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-declaration
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf

    misspell:
      locale: US
      ignore-words:
        - unknwon
        - destory

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
